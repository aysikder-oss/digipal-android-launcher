name: Build Android Launcher APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APKs
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release-unsigned.apk release/DigipalLauncher-v1-release.apk
          cp app/build/outputs/apk/debug/app-debug.apk release/DigipalLauncher-v1-debug.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigipalLauncher-v1-release
          path: release/DigipalLauncher-v1-release.apk
          retention-days: 90

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigipalLauncher-v1-debug
          path: release/DigipalLauncher-v1-debug.apk
          retention-days: 90

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Digipal Launcher v1.0.${{ github.run_number }}
          files: |
            release/DigipalLauncher-v1-release.apk
            release/DigipalLauncher-v1-debug.apk
          make_latest: true
          body: |
            Digipal Launcher v1.0.${{ github.run_number }}
            
            Dedicated Android launcher with bundled GeckoView engine for Digipal signage.
            
            **DigipalLauncher-v1-release.apk** — Production build (unsigned, needs signing for Play Store)
            **DigipalLauncher-v1-debug.apk** — Debug build for testing/sideloading
            
            Built from commit ${{ github.sha }}
